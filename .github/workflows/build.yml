name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple -e ".[dev]"
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple pyinstaller
          
      - name: Build executable
        run: |
          pyinstaller deskpet.spec --clean
          dir dist

      - name: Create ZIP
        run: |
          if (Test-Path "dist\DeskPet\DeskPet.exe") {
            Compress-Archive -Path "dist\DeskPet" -DestinationPath "DeskPet-win64.zip"
          } elseif (Test-Path "dist\DeskPet.exe") {
            Compress-Archive -Path "dist\DeskPet.exe" -DestinationPath "DeskPet-win64.zip"
          } else {
            Get-ChildItem dist
            throw "Cannot find DeskPet executable"
          }
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskPet-win64
          path: DeskPet-win64.zip
          
      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DeskPet-win64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
